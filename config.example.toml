# olha notification center configuration
# Place this at ~/.config/olha/config.toml

[general]
# Optional: custom database path (default: ~/.local/share/olha/notifications.db)
# db_path = "~/.local/share/olha/notifications.db"

[retention]
# Maximum age of notifications to keep
# Supported units: d (days), h (hours), m (minutes), s (seconds)
max_age = "30d"

# Maximum number of notifications to keep in the database
max_count = 10000

# How often to run automatic cleanup
cleanup_interval = "1h"

[notifications]
# Default timeout for normal urgency notifications (seconds)
# 0 means never expire
default_timeout = 10

# Timeout for low urgency notifications
timeout_low = 5

# Timeout for critical urgency notifications
# 0 means never expire (recommended for critical)
timeout_critical = 0

# Notification rules - these are processed in order
# Each rule can match on one or more fields using regex patterns
# When a notification matches all specified fields, the action is taken

[[rules]]
name = "mute-slack-threads"
# Match Slack app and any notification containing "Thread:"
app_name = "Slack"
summary = "Thread:.*"
action = "clear"  # Automatically clear matching notifications

[[rules]]
name = "ignore-spotify"
# Don't even store Spotify notifications in the database
app_name = "Spotify"
action = "ignore"

[[rules]]
name = "critical-always-expire"
# Critical notifications always expire after timeout (unless matched by another rule)
urgency = "critical"
action = "clear"

# Example of matching by category
[[rules]]
name = "mute-network-events"
category = "network.*"
action = "clear"

# Example of full-text matching
[[rules]]
name = "mute-system-messages"
summary = "^(Update|System|Info):.*"
body = "^installed|^completed|^finished"
action = "clear"
