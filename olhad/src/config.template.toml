# olha notification center — created automatically on first run.
# Every value shown is the built-in default; uncomment to customize.
# For filter rule examples see the "Notification Rules" section in README.md.

[general]
# Optional: custom database path.
# db_path = "~/.local/share/olha/notifications.db"

[retention]
# Max age of notifications kept in the database.
# Units: d=days, h=hours, m=minutes, s=seconds.
# max_age          = "30d"
# max_count        = 10000
# cleanup_interval = "1h"

[notifications]
# Per-urgency expiry (seconds). 0 = never expire.
# default_timeout  = 10
# timeout_low      = 5
# timeout_critical = 0

[dnd]
# Do Not Disturb. Toggle the *runtime* state with `olha dnd on|off|toggle`
# (it persists across daemon restarts). This section only configures the
# policy applied while DND is active.
#
# allow_critical = false   # set true to let critical urgency pop through

[encryption]
# At-rest encryption of notification content (summary, body, hints).
#
# When enabled, olhad seals every notification under a long-lived
# X25519 public key on write. Reads require the matching secret key,
# which is wrapped with a DEK derived from `pass show <pass_entry>`
# and only unwrapped into daemon memory on `olha unlock`.
#
# Writes work even while the daemon is locked — incoming notifications
# are sealed with the public key and persist as ciphertext. Running
# `olha list` (or the popup querying history) while locked shows
# `[encrypted]` placeholders until you unlock.
#
# Setup (run once, before flipping `enabled = true`):
#     olha encryption init          # generate keypair + wrap sk under pass DEK
#     olha encryption enable        # wipes plaintext rows, flips flag
#
# Session flow:
#     olha unlock                   # one pinentry prompt; 5-min idle timer starts
#     olha lock                     # zeroizes sk immediately
#
# If you lose the pass entry, encrypted rows become unreadable. Back
# up `~/.password-store/olha/db-key.gpg` alongside the DB.
#
# enabled        = false
# pass_entry     = "olha/db-key"
# auto_lock_secs = 300    # idle seconds before auto-lock; 0 disables

# Used by `olha-popup` (requires a wlr-layer-shell compositor).
# Ignored by `olhad` itself.
[popup]
# position    = "top-right"   # top-right | top-left | bottom-right | bottom-left
# max_visible = 5             # oldest non-critical popup is evicted when exceeded
# margin      = 12            # px from screen edge
# gap         = 8             # px between stacked popups
# width       = 380
# height      = 120          # minimum popup height (px); short notifications use this
# max_height  = 240          # ceiling; bodies past this point are truncated with …
#
# Privacy: when true AND the daemon is locked, popups render a generic
# "<app>" / "New notification" placeholder instead of the real content.
# The daemon still has plaintext at Notify time (it just hasn't stored
# it as plaintext), so this is purely a rendering choice. Override per
# rule with `hide_content_when_locked = true|false` on `[[popup.rules]]`.
# hide_content_when_locked = false


# ───────────────────────── Notification rules ─────────────────────────
#
# Two independent rule lists, two different moments in a notification's
# life. Don't mix them up.
#
#   notify-send ─► [[rules]] ─► SQLite ─► [[popup.rules]] ─► popup
#                  (olhad)                 (olha-popup only)
#
# • [[rules]]        — read by olhad. Controls *storage* and *click handlers*.
# • [[popup.rules]]  — read by olha-popup. Controls *display only*; cannot
#                      stop storage (olhad already stored the notification
#                      by the time the popup sees it).
#
# Each list is evaluated in order; first match wins.
# Regex fields use Rust's `regex` crate — unanchored and case-sensitive
# by default. Prefer 'single-quoted' TOML literal strings for patterns so
# you don't have to double-escape backslashes.
#
# ───────────────────── Daemon rules — [[rules]] ─────────────────────
#
# A daemon rule has a *match* part (regex/urgency/category conditions)
# and a *verdict* part. The verdict has TWO pieces with confusingly
# similar names, and they do different jobs at different moments:
#
#   `action`           (top-level scalar, REQUIRED)
#       The STORAGE verdict. Applied once when the notification arrives.
#       Exactly one of:
#         "clear"  — store it, but mark it cleared immediately.
#                    (Appears in `olha list`, but not as unread.)
#         "ignore" — do not store at all. Vanishes completely.
#         "none"   — store it normally (as unread). Use this when the
#                    rule exists only to attach click handlers below.
#
#   [rules.on_action]  (nested table, OPTIONAL)
#       Per-button CLICK handlers. Keys are *action keys the sending
#       app registered* (e.g. "default" for body-click, "reply",
#       "open") — NOT the storage-verdict values above. Values are
#       shell commands run under `sh -c` when the user clicks.
#       Available env vars: OLHA_APP_NAME, OLHA_SUMMARY, OLHA_BODY,
#       OLHA_URGENCY, OLHA_ACTION_KEY, OLHA_DESKTOP_ENTRY,
#       OLHA_NOTIFICATION_ID.
#
#       Pitfall: writing `none = "..."` or `clear = "..."` under
#       [rules.on_action] does nothing — no real app emits those
#       strings as action keys. olhad logs a warning at startup if it
#       sees one. Use `default` or whatever key `olha show <id>`
#       reveals the notification actually carries.
#
# Example 1 — auto-clear chatty notifications. Stored as cleared, no popup.
# [[rules]]
# name     = "mute-slack-threads"
# app_name = "Slack"
# summary  = "Thread:.*"
# action   = "clear"
#
# Example 2 — drop entirely. Not stored, not popped, gone.
# [[rules]]
# name     = "ignore-spotify"
# app_name = "Spotify"
# action   = "ignore"
#
# Example 3 — store normally, but bind custom click handlers.
# [[rules]]
# name     = "focus-signal"
# app_name = '^Signal$'
# action   = "none"                     # leave storage alone
#
# [rules.on_action]
# default = "signal-desktop --activate"  # body click
# reply   = "notify-send 'Replied to $OLHA_SUMMARY'"
#
# ─────────────── Popup-only rules — [[popup.rules]] ───────────────
#
# Read by olha-popup only. These fire at DISPLAY time, after the
# daemon has already stored the notification. They can:
#
#   suppress              = true           don't show the popup at all
#   override_urgency      = "normal"       re-label for rendering only
#   override_timeout_secs = 4              force a specific dismiss timeout
#
# A rule may combine several of these. Match fields are the same as
# daemon rules (app_name, summary, body, urgency). A rule with *no*
# match fields is a catch-all.
#
# [[popup.rules]]
# name             = "demote-teams"
# app_name         = '^Microsoft Teams$'
# override_urgency = "normal"
#
# [[popup.rules]]
# name     = "hide-spotify"
# app_name = '^Spotify$'
# suppress = true
#
# [[popup.rules]]
# name                  = "short-timeout-for-slack"
# app_name              = '^Slack$'
# override_timeout_secs = 4
#
# [[popup.rules]]
# name                     = "always-hide-signal-preview-when-locked"
# app_name                 = '(?i)^signal$'
# hide_content_when_locked = true    # overrides the global default
